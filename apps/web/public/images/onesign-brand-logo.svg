<?xml version="1.0" encoding="UTF-8"?>
<!--
  OneSign brand lockup - matches AuthBrandHeader (hero variant) on the login page.
  Tile: 4rem x 3.75rem, rx 0.5rem, gap 1rem, theme #047857, icon Lucide Tv @ 32px
  Font: Google Sans Variable (same as app); falls back to system sans if unavailable.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="204" height="60" viewBox="0 0 204 60" fill="none" role="img" aria-label="OneSign Console">
  <!-- Brand mark tile -->
  <rect width="64" height="60" rx="8" fill="#047857"/>

  <!-- TV icon (Lucide "Tv", strokeWidth 2.5, centered in 64x60 tile) -->
  <g transform="translate(16 14) scale(1.333333)" stroke="#F5FAF8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M4 7h16a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2z"/>
    <path d="M17 2l-5 5-5-5"/>
  </g>

  <!-- Wordmark (row layout, align-items: center, gap 1rem from tile) -->
  <g font-family="'Google Sans Variable', 'Google Sans', ui-sans-serif, system-ui, sans-serif">
    <text
      x="80"
      y="21.8"
      fill="#FFFFFF"
      font-size="26"
      font-weight="700"
      letter-spacing="-0.26"
      dominant-baseline="central"
    >OneSign</text>
    <text
      x="80"
      y="45.95"
      fill="rgba(255,255,255,0.75)"
      font-size="12"
      font-weight="400"
      letter-spacing="0.96"
      dominant-baseline="central"
    >CONSOLE</text>
  </g>
</svg>
